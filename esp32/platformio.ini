; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
lib_deps =
  h2zero/NimBLE-Arduino@1.4.2
  t-vk/ESP32 BLE Keyboard@0.3.2
  lennarthennigs/Button2@^2.3.3
  adafruit/Adafruit LIS3MDL@^1.2.4
  bodmer/TFT_eSPI@^2.5.43
monitor_filters = log2file, time, send_on_enter, esp32_exception_decoder
monitor_speed = 115200
build_flags =
  -Wall -Wextra
  -DUSE_NIMBLE
  -D USER_SETUP_LOADED=1
  -include $PROJECT_LIBDEPS_DIR/$PIOENV/TFT_eSPI/User_Setups/Setup25_TTGO_T_Display.h
  ; -DUSE_MPU9250
  ; -DCONFIG_NIMBLE_CPP_LOG_LEVEL=5
